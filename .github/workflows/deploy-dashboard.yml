name: Deploy Dashboard

on:
  push:
    branches: [master]  # Using master branch
    paths:
      - "dashboard/**"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Install API dependencies
        run: |
          cd dashboard/api
          npm install
          cd ../..

      - name: Build And Deploy
        id: deploy_swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/dashboard"
          api_location: "/dashboard/api"
          output_location: "build"  # Vite config specifies 'build' as outDir
        continue-on-error: true

      - name: Check deployment status
        if: steps.deploy_swa.outcome == 'failure'
        run: |
          echo "::warning::Dashboard deployment skipped - SWA_DEPLOYMENT_TOKEN secret not configured"
          echo "To deploy the dashboard:"
          echo "1. Create an Azure Static Web App"
          echo "2. Get the deployment token from Azure Portal"
          echo "3. Add it as a GitHub secret named SWA_DEPLOYMENT_TOKEN"
